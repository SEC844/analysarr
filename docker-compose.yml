services:
  analysarr:
    image: ghcr.io/sec844/analysarr:latest
    container_name: analysarr
    ports:
      - "8080:8080"
    volumes:
      # Bibliothèque média (Radarr/Sonarr) — lecture seule
      - /mnt/user/media:/media:ro
      # Répertoire data complet — Analysarr détecte automatiquement torrents/ et cross-seed/
      # (fonctionne si qBittorrent utilise /data/torrents, /data/complete, etc.)
      - /mnt/user/data:/data:ro
      # Config persistante
      - /mnt/user/appdata/analysarr:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/scan/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
