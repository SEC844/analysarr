services:
  analysarr:
    build: .
    container_name: analysarr
    ports:
      - "8080:8080"
    volumes:
      # Adapter les chemins à votre installation
      - /path/to/media:/media:ro
      - /path/to/torrents:/data/torrents:ro
      # Décommenter si vous utilisez Cross Seed :
      # - /path/to/cross-seed:/data/cross-seed:ro
      - /path/to/appdata/analysarr:/config
    environment:
      - CONFIG_PATH=/config/settings.json
    restart: unless-stopped
