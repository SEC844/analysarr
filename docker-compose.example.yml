version: "3.8"

services:
  analysarr:
    image: ghcr.io/SEC844/analysarr:latest
    container_name: analysarr
    ports:
      - "3000:3000"
    volumes:
      - /mnt/user/data:/data:ro              # qBittorrent download root (read-only)
      - /mnt/user/media:/media:ro            # Radarr / Sonarr media root (read-only)
      - /mnt/user/appdata/analysarr:/config  # Persistent config (credentials, path mappings)
    restart: unless-stopped
    networks:
      - media

networks:
  media:
    external: true
