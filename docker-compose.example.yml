services:
  analysarr:
    build: .
    container_name: analysarr
    ports:
      - "8080:8080"
    volumes:
      # Adapter les chemins à votre installation
      - /path/to/media:/media:ro
      # Analysarr détecte automatiquement les sous-dossiers torrents/ et cross-seed/
      - /path/to/data:/data:ro
      # Si auto-détection insuffisante, montages fins (décommenter) :
      # - /path/to/torrents:/data/torrents:ro
      # - /path/to/cross-seed:/data/cross-seed:ro
      - /path/to/appdata/analysarr:/config
    environment:
      - CONFIG_PATH=/config/settings.json
    restart: unless-stopped
